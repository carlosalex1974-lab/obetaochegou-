<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBetãoChegou - Previsões</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo">
            <h1>OBetão<span>Chegou</span></h1>
        </div>
        <p class="subtitle">A inteligência por trás dos greens diários.</p>
    </header>

    <main class="dashboard">
        <section class="controls-bar">
            <div class="actions-left">
                <button id="refresh-btn" class="btn primary">Atualizar Previsões</button>
                <div class="search-wrapper">
                    <input type="text" id="search-input" placeholder="🔍 Buscar time...">
                </div>
            </div>
            
            <div class="filters">
                <button class="filter-pill active" data-filter="all">Todos</button>
                <button class="filter-pill" data-filter="today">Hoje</button>
            </div>
        </section>

        <div class="status-indicator" style="margin-bottom: 1.5rem; justify-content: center;">
            <span class="dot pulse"></span>
            <span id="status-text">Buscando inteligência do backend...</span>
        </div>

        <section class="predictions-grid" id="predictions-grid">
            <!-- Os cards serão injetados aqui via JS -->
        </section>
    </main>

    <div id="analysis-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Análise Completa</h2>
                <button id="close-modal-btn" class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <p id="modal-text"></p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
